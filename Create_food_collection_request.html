{% extends 'User_base.html' %}

{% block title %} Create-FC-Request  {% endblock title %}

{% block content %}

  <div class="header bg-primary pb-6 pt-0">
    <div class="container-fluid">
      <div class="header-body">
        <div class="row align-items-center py-2">
          <div class="col-lg-6 col-7">
            <h1 class="h2 text-white font-weight-bold mb-0">Create Request</h1>
            <nav aria-label="breadcrumb" class="d-none d-md-inline-block mt-3">
              <ol class="breadcrumb breadcrumb-links breadcrumb-dark bg-transparent p-0">
                <li class="breadcrumb-item"><a href="/"><i class="fas fa-home"></i></a></li>
                <li class="breadcrumb-item active" aria-current="page">New Request</li>
              </ol>
            </nav>
          </div>
        </div>
      </div>
    </div>
  </div>

<!-- Page content -->
<div class="container-fluid mt--6">
  <div class="row justify-content-center">

    <div class="col-xl-10 order-xl-1">
      <div class="card">
        <div class="card-header">
          <div class="row align-items-center">
            <div class="col-8">
              <h3 class="mb-0">Create-FC-Request </h3>
            </div>
          </div>
        </div>
        <div class="card-body">
          <form action="" method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <h6 class="heading-small text-muted mb-4">User information</h6>
            <div class="pl-lg-4">
              <div class="row"> 
                <div class="col-lg-6">
                  <div class="form-group">
                    <label class="form-control-label" for="input-email">Email address</label>
                    <input type="email" id="input-email" name="email" class="form-control" readonly placeholder="{{ request.user.email }}" value="{{ request.user.email }}">
                  </div>
                </div>
              </div>
              <div class="row"> 
                <div class="col-lg-6">
                  <div class="form-group">
                    <label class="form-control-label" for="input-email">First Name</label>
                    <input type="text" id="input-email" name="first_name" class="form-control" readonly placeholder="{{ request.user.first_name }}" value="{{ request.user.first_name }}">
                  </div>
                </div>
              </div>
              <div class="row"> 
                <div class="col-lg-6">
                  <div class="form-group">
                    <label class="form-control-label" for="input-email">Last Name</label>
                    <input type="text" id="input-email" name="last_name" class="form-control" readonly placeholder="{{ request.user.last_name }}" value="{{ request.user.last_name }}">
                  </div>
                </div>
              </div>
              <div class="row"> 
                <div class="col-lg-6">
                  <div class="form-group">
                    <label class="form-control-label" for="input-email">Contact Number</label>
                    <input type="number" id="input-email" name="phone_number" class="form-control" readonly placeholder="{{ request.user.phone_number }}" value="{{ request.user.phone_number }}">
                  </div>
                </div>
              </div>
            </div>
            <hr class="my-4" />

            <!-- Address -->
            <h6 class="heading-small text-muted mb-4">information</h6>
            <div class="pl-lg-4">
              
              <div class="row">
                <div class="col-lg-4">
                  <div class="form-group">
                    <label class="form-control-label" for="input-address">Area</label>
                    <select id="inputGroupSelect01" name="area" class="form-control" name="area" aria-label="Default select example">
                      {% for area in areas %}
                          <option value="{{ area.area_id }}" {% if area.area_name == 'Thaltej' %}selected{% endif %}>{{ area.area_name }}</option>
                      {% endfor %}
                  </select>
                  </div>
                </div>
              </div>
              <div class="row">
                <div class="col-lg-4">
                  <div class="form-group">
                    <label class="form-control-label" for="input-address">Type</label>
                    <select id="inputGroupSelect01" name="type" class="form-control" name="type" aria-label="Default select example">
                      <option value="Veg" >Veg</option>
                      <option value="Non-Veg">Non-Veg</option>
              </select>
                  </div>
                </div>
              </div>
              <div class="row">
                <div class="col-lg-4">
                  
                  <div class="form-group">
                    <label class="form-control-label" for="input-address">Address</label>
                    <textarea rows="4" name="address" class="form-control" ></textarea>
                  </div>
                </div>
              </div>
              <div class="row">
                <div class="col-lg-4">
                  <div class="form-group">
                    <label class="form-control-label" for="input-address">Detailed Description</label>
                    <textarea rows="4" name="detailed_description" class="form-control" ></textarea>
                  </div>
                </div>
              </div>
            </div>
            
            <h6 class="heading-small text-muted mb-4">Upload Photo</h6>
            <div class="form-group">
              <div class="pl-lg-4" style="margin-bottom: 8px;">
                <input class="form-control" name="food_photo" type="file" id="formFile" />
              </div>
            </div>
            <hr class="my-4" />
            <!-- Description -->
            
            <div class="col-12 text-right">
              <button class="btn btn-sm btn-primary">Create </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>


</div>

{% endblock content %}

<!-- Specific JS goes HERE --> 
{% block javascripts %}{% endblock javascripts %}
